<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050C18">
  <title>SalaIncs · Centro de Control IoT</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div id="app">

  <!-- ── TOP BAR ─────────────────────────── -->
  <div id="topbar">
    <div class="tb-logo">
      <img src="assets/logo.png" alt="SalaIncs">
      <div class="tb-name">Sala<em>Incs</em></div>
    </div>
    <div class="tb-right">
      <div class="tb-status">● SISTEMA AUTÓNOMO · OPERATIVO</div>
      <div id="clock">--:--:--</div>
    </div>
  </div>

  <!-- ── LINE TABS ────────────────────────── -->
  <div id="line-tabs"></div>

  <!-- MOBILE: show map button (hidden on desktop via CSS) -->
  <button id="mob-map-btn" onclick="toggleMobMap()">🗺 Ver mapa · Línea D</button>

  <!-- ── MAIN GRID ────────────────────────── -->
  <div id="main">

    <!-- LEFT: Map + Metrics -->
    <div style="display:flex;flex-direction:column;overflow:hidden;">

      <!-- Map -->
      <div id="map-panel">
        <div id="map-label">Línea D · Tiempo real</div>
        <canvas id="map-canvas"></canvas>
      </div>

      <!-- Metrics bar -->
      <div id="metrics-bar"></div>

    </div>

    <!-- RIGHT: Trains · Env · Events -->
    <div id="right-panel">

      <!-- Formations -->
      <div class="panel-section" style="flex-shrink:0">
        <div class="panel-title" style="color:var(--orange);border-bottom-color:var(--orange)">
          ⚡ Formaciones
        </div>
        <div class="panel-body" id="trains-body"></div>
      </div>

      <!-- Environmental -->
      <div class="panel-section" style="flex:1">
        <div class="panel-title" style="color:var(--accent);border-bottom-color:var(--accent)">
          🌡 Ambiental · Estaciones
        </div>
        <div class="panel-body" id="env-body"></div>
      </div>

      <!-- Events -->
      <div class="panel-section" style="flex-shrink:0">
        <div class="panel-title" style="color:var(--red);border-bottom-color:var(--red)">
          ⚡ Eventos
        </div>
        <div class="panel-body" id="event-log" style="max-height:200px;overflow-y:auto;"></div>
      </div>

    </div>
  </div>

</div>

<!-- Scripts (order matters) -->
<script src="js/dashboard/data.js"></script>
<script src="js/dashboard/map.js"></script>
<script src="js/dashboard/app.js"></script>

</body>
</html>
